site_name: OBiBa
site_url: https://obiba.github.io
site_description: Open Source Software for BioBanks
site_author: OBiBa
repo_url: https://github.com/obiba
copyright: Copyright &copy; OBiBa

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/logo.png
  favicon: assets/images/favicon.ico
  
  features:
    # Navigation
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    
    # Table of Contents
    - toc.follow
    
    # Search
    - search.suggest
    - search.highlight
    - search.share
    
    # Content
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    
  palette:
    # Light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    
    # Dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  
  - blog:
      blog_dir: blog
      blog_toc: true
      post_date_format: medium
      post_url_date_format: yyyy/MM/dd
      post_url_format: "{date}/{slug}"
      post_slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
      post_slugify_separator: "-"
      categories_allowed:
        - releases
        - events
        - announcements
      authors_file: "{blog}/.authors.yml"
  
  - tags
  
  - redirects:
      redirect_maps:
        pages/about/index.html: about/index.md
        pages/documentation/index.html: documentation/index.md
        pages/news/event/bbmri-lpc/index.html: blog/2025/11/09/bbmri-lpc-website-launched/
