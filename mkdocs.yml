site_name: OBiBa
site_url: https://obiba.github.io
site_description: Open Source Software for BioBanks
site_author: OBiBa
repo_url: https://github.com/obiba
copyright: Copyright &copy; OBiBa

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  
  - blog:
      blog_dir: blog
      blog_toc: true
      post_date_format: medium
      post_url_date_format: yyyy/MM/dd
      post_url_format: "{date}/{slug}"
      post_slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
      post_slugify_separator: "-"
      categories_allowed:
        - releases
        - events
        - announcements
      authors_file: "{blog}/.authors.yml"
  
  - tags:
      tags_file: tags.md
  
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Products:
    - products/index.md
    - Opal: products/opal/index.md
    - Mica: products/mica/index.md
    - Agate: products/agate/index.md
    - Rock: products/rock/index.md
    - Amber: products/amber/index.md
    - Onyx: products/onyx/index.md
    - DataSHIELD: products/datashield/index.md
  - Documentation: documentation/index.md
  - News: blog/index.md
  - Support: support/index.md
  - About: about/index.md
  - Publications: publications/index.md
  - Stories: stories/index.md
